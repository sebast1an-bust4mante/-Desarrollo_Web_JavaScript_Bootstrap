<!DOCTYPE html>
<html lang="es">

<head>
    <!-- limite de caracteres -->
    <meta charset="UTF-8">
    <!-- Para que la pagina se ajuste a los distintos dispositivos -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Autor de la pagina -->
    <meta name="author" content="sebastianbustamante@liceovvh.cl">
    <title>Desarrollo Web JS y Bootstrap</title>
    <!-- Estilos boostrap  -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <!--  Representa contenido introductorio -->
    <header>
        <!-- Barra de navegación -->
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Navbar</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Features</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Pricing</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link disabled" aria-disabled="true">Disabled</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container p-2 d-flex gap-3 flex-wrap">
        <div class="card" style="width: 18rem;">
            <div class="card-body">
                <h5 class="card-title">Ejercicio 1: </h5>
                <p class="card-text"> Función con validación de datos (push)</p>
                <input type="text" class="form-control mb-3" id="input1" placeholder="Ingresar un numero">
                <a href="#" class="btn btn-primary" onclick="pagoPermiso()">Ejecutar</a>
                <div id="container1" class="mt-4 d-none">
                    <h5>Resultado:</h5>
                    <div id="result1" class="alert alert-success fw-bold"></div>
                </div>
            </div>
        </div>
        <div class="card" style="width: 18rem;">
            <div class="card-body">
                <h5 class="card-title">Ejercicio 2: </h5>
                <p class="card-text"> Lista de Asistencia Automática
                </p>
                <input type="text" class="form-control mb-3" id="input2" placeholder="Ingresar una nota">
                <a href="#" class="btn btn-primary" onclick="agregarFila()">Ejecutar</a>
                <a href="#" class="btn btn-primary" onclick="filaVacunacion()">Ejecutar</a>
                <div id="container2" class="mt-4 d-none">
                    <h5>Resultado:</h5>
                    <div id="result2" class="alert alert-success fw-bold"></div>
                </div>
            </div>
        </div>
        <div class="card" style="width: 18rem;">
            <div class="card-body">
                <h5 class="card-title">Ejercicio 3: </h5>
                <p class="card-text">Uso de múltiples funciones</p>
                <input type="text" class="form-control mb-3" id="input3" placeholder="Ingrese un número">
                <a href="#" class="btn btn-primary" onclick="procesarNumero()">Ejecutar</a>
            </div>
            <div id="container3" class="mt-4 d-none">
                <h5>Resultado:</h5>
                <div id="result3" class="alert alert-success fw-bold"></div>
            </div>
        </div>
    </main>

    <script src="static/js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
